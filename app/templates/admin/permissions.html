<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Permissions Matrix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  {% include "_header.html" %}

  <div class="max-w-7xl mx-auto p-8">

    <h1 class="text-3xl font-bold mb-6">Permissions Matrix</h1>

    <table class="min-w-full bg-white border rounded shadow">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2 text-left">Feature</th>
          <th class="p-2 text-center">Admin</th>
          <th class="p-2 text-center">Read</th>
          <th class="p-2 text-center">Helpdesk</th>
        </tr>
      </thead>

      <tbody>
        <tr class="border-b">
          <td class="p-2">View Servers</td>
          <td class="p-2 text-green-600 text-center">✔</td>
          <td class="p-2 text-green-600 text-center">✔</td>
          <td class="p-2 text-green-600 text-center">✔</td>
        </tr>

        <tr class="border-b">
          <td class="p-2">Run Network Scan</td>
          <td class="p-2 text-green-600 text-center">✔</td>
          <td class="p-2 text-red-600 text-center">✖</td>
          <td class="p-2 text-red-600 text-center">✖</td>
        </tr>

        <tr class="border-b">
          <td class="p-2">Reset AD Passwords</td>
          <td class="p-2 text-green-600 text-center">✔</td>
          <td class="p-2 text-red-600 text-center">✖</td>
          <td class="p-2 text-green-600 text-center">✔</td>
        </tr>
      </tbody>
    </table>

  </div>

</body>
</html>
