<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>User Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  {% include "_header.html" %}

  <div class="max-w-7xl mx-auto p-8">

    <h1 class="text-3xl font-bold mb-6">User Management</h1>

    <h2 class="text-xl font-semibold mb-4">Add User</h2>

    /admin/users/add
      <div class="mb-4">
        <label>Username</label>
        <input name="username" class="border p-2 rounded w-full" required>
      </div>

      <div class="mb-4">
        <label>Password</label>
        <input type="password" name="password" class="border p-2 rounded w-full" required>
      </div>

      <div class="mb-4">
        <label>Role</label>
        <select name="role" class="border p-2 rounded w-full">
          <option value="admin">Admin</option>
          <option value="read">Read Only</option>
          <option value="helpdesk">Helpdesk</option>
        </select>
      </div>

      <button class="bg-blue-600 text-white px-4 py-2 rounded">Add User</button>
    </form>

    <hr class="my-8" />

    <h2 class="text-xl font-semibold mb-4">Existing Users</h2>

    <table class="min-w-full bg-white border rounded shadow">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2 text-left">Username</th>
          <th class="p-2 text-left">Role</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr class="border-b">
          <td class="p-2">{{ u.username }}</td>
          <td class="p-2">{{ u.role }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

  </div>

</body>
</html>
