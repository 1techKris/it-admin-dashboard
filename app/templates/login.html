<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="bg-white p-8 shadow rounded w-96">

  <h1 class="text-2xl font-bold mb-4">Login</h1>

  {% if error %}
  <p class="text-red-600 mb-2">{{ error }}</p>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-4">
      <label class="block mb-1">Username</label>
      <input name="username" class="w-full p-2 border rounded" required />
    </div>

    <div class="mb-4">
      <label class="block mb-1">Password</label>
      <input name="password" type="password" class="w-full p-2 border rounded" required />
    </div>

    <button class="bg-blue-600 text-white py-2 px-4 w-full rounded">Login</button>
  </form>

</div>
</body>
</html>
