{% if group_counts %}
  <div class="flex flex-wrap gap-4">
    {% for name, count in group_counts.items() %}
      <div class="bg-bghover border border-border px-4 py-3 rounded">
        <div class="text-gray-400 text-xs">{{ name }}</div>
        <div class="text-xl font-semibold">{{ count }}</div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="text-gray-400">No groups defined.</div>
{% endif %}
